name: Update World Cup Data

on:
  schedule:
    # 北京时间 07:00 = UTC 23:00
    - cron: '0 23 * * *'
    # 北京时间 12:00 = UTC 04:00
    - cron: '0 4 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch World Cup data
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
        run: node scripts/fetch-data.js

      - name: Check if data changed
        id: check-changes
        run: |
          git diff --quiet data.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update World Cup data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
